<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — LabSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #6c63ff;
      --accent-h:  #8b85ff;
      --text:      #e8e8f0;
      --muted:     #5a5a72;
      --error:     #ff5c7a;
      --success:   #39d98a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-glow {
      position: fixed; pointer-events: none; z-index: 0;
      width: 600px; height: 600px; border-radius: 50%;
      filter: blur(120px); opacity: 0.18;
      background: var(--accent);
      top: -150px; left: -150px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(80px, 60px); }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      letter-spacing: -.02em;
    }
    .brand-name span { color: var(--accent); }

    /* ── Heading ── */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem; font-weight: 700;
      letter-spacing: -.03em; margin-bottom: .4rem;
    }
    .sub {
      color: var(--muted); font-size: .875rem; margin-bottom: 2rem;
    }

    /* ── Form ── */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block; font-size: .78rem; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: .45rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      padding: .75rem 1rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    input::placeholder { color: var(--muted); }

    /* ── Button ── */
    .btn {
      width: 100%; margin-top: .5rem;
      background: var(--accent);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 600;
      padding: .8rem;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(108,99,255,.35);
    }
    .btn:hover { background: var(--accent-h); box-shadow: 0 6px 28px rgba(108,99,255,.5); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Toast / Alert ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: .7rem 1.2rem;
      font-size: .875rem; font-weight: 500;
      display: flex; align-items: center; gap: .5rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
      white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error  { border-color: var(--error);   color: var(--error); }
    #toast.success{ border-color: var(--success);  color: var(--success); }

    /* ── Footer link ── */
    .footer-link {
      text-align: center; margin-top: 1.6rem;
      font-size: .85rem; color: var(--muted);
    }
    .footer-link a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .footer-link a:hover { color: var(--accent-h); }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border); margin: 1.5rem 0;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">⚗️</div>
      <div class="brand-name">Lab<span>System</span></div>
    </div>

    <h1>Bienvenido</h1>
    <p class="sub">Inicia sesión para continuar</p>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" placeholder="usuario@lab.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Iniciar sesión</button>

    <div class="divider"></div>

    <div class="footer-link">
      ¿No tienes cuenta? <a href="register.html">Regístrate</a>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
<script>
  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
