<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — LabSystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface2:  #16161f;
      --border:    #1e1e2e;
      --accent:    #6c63ff;
      --accent-h:  #8b85ff;
      --text:      #e8e8f0;
      --muted:     #5a5a72;
      --error:     #ff5c7a;
      --success:   #39d98a;
      --warning:   #ffd166;
      --sidebar-w: 240px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Layout ── */
    .layout {
      display: flex; min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1.5rem 1rem;
      position: sticky; top: 0; height: 100vh;
    }
    .brand {
      display: flex; align-items: center; gap: .6rem;
      padding: .25rem .5rem; margin-bottom: 2rem;
    }
    .brand-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1rem;
      letter-spacing: -.02em;
    }
    .brand-name span { color: var(--accent); }

    .nav-label {
      font-size: .7rem; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
      font-weight: 500; padding: 0 .5rem;
      margin-bottom: .5rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: .65rem;
      padding: .6rem .75rem; border-radius: 9px;
      font-size: .875rem; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: background .2s, color .2s;
      text-decoration: none; user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .nav-item.active {
      background: rgba(108,99,255,.15);
      color: var(--accent);
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: .65rem;
      padding: .6rem .75rem; border-radius: 9px;
    }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-family: 'Syne', sans-serif;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: .72rem; color: var(--muted); }
    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; padding: .2rem;
      transition: color .2s;
    }
    .logout-btn:hover { color: var(--error); }

    /* ── Main ── */
    .main {
      flex: 1; overflow-y: auto;
      padding: 2rem 2.5rem;
      max-width: 960px;
    }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
      animation: fadeUp .4s ease both;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      letter-spacing: -.02em;
    }
    .page-title span { color: var(--muted); font-weight: 400; font-size: 1rem; }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
      animation: fadeUp .4s .05s ease both;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .stat-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 700; line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.warning { color: var(--warning); }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      animation: fadeUp .4s .1s ease both;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
    }

    /* ── Add-product form (inline) ── */
    .add-form {
      display: flex; gap: .75rem; align-items: flex-end;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 140px; }
    .form-group label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .form-group input {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; padding: .6rem .85rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .form-group input::placeholder { color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      border: none; border-radius: 9px;
      font-family: 'Syne', sans-serif; font-weight: 600;
      font-size: .875rem; cursor: pointer;
      transition: all .18s; white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
      padding: .62rem 1.1rem;
      box-shadow: 0 3px 14px rgba(108,99,255,.35);
    }
    .btn-primary:hover { background: var(--accent-h); box-shadow: 0 5px 20px rgba(108,99,255,.5); }
    .btn-primary:active { transform: scale(.97); }

    .btn-ghost {
      background: rgba(255,255,255,.05);
      color: var(--text); padding: .55rem .9rem;
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.09); }

    .btn-danger {
      background: rgba(255,92,122,.1);
      color: var(--error); padding: .45rem .75rem;
      border: 1px solid rgba(255,92,122,.2);
      font-size: .8rem;
    }
    .btn-danger:hover { background: rgba(255,92,122,.2); }

    .btn-edit {
      background: rgba(108,99,255,.1);
      color: var(--accent); padding: .45rem .75rem;
      border: 1px solid rgba(108,99,255,.2);
      font-size: .8rem;
    }
    .btn-edit:hover { background: rgba(108,99,255,.2); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      text-align: left; padding: .85rem 1.5rem;
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
      font-weight: 500; border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(30,30,46,.6);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    tbody td {
      padding: .9rem 1.5rem; font-size: .9rem;
    }
    .product-name { font-weight: 500; }
    .product-price {
      font-family: 'Syne', sans-serif; font-weight: 600;
      color: var(--success);
    }
    .badge {
      display: inline-flex; align-items: center;
      padding: .2rem .6rem; border-radius: 20px;
      font-size: .72rem; font-weight: 600;
      background: rgba(108,99,255,.15); color: var(--accent);
    }
    .actions { display: flex; gap: .5rem; }

    /* ── Empty state ── */
    .empty-state {
      padding: 3.5rem 1.5rem; text-align: center;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }
    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 600; margin-bottom: .35rem;
    }
    .empty-sub { font-size: .875rem; color: var(--muted); }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, rgba(40,40,60,.8) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; height: 18px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── Edit modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      z-index: 100; display: none;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 1.75rem;
      width: 100%; max-width: 380px;
      animation: fadeUp .25s ease both;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem;
    }
    .modal-actions { display: flex; gap: .75rem; margin-top: 1.25rem; justify-content: flex-end; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: .7rem 1.2rem;
      font-size: .875rem; font-weight: 500;
      display: flex; align-items: center; gap: .5rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
      white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error   { border-color: var(--error);   color: var(--error); }
    #toast.success { border-color: var(--success);  color: var(--success); }

    /* ── Row fade animations ── */
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes rowOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-10px); }
    }
    tbody tr { animation: rowIn .25s ease both; }
    tbody tr.removing { animation: rowOut .2s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .sidebar { display: none; }
      .main { padding: 1.25rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .add-form { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">⚗️</div>
      <div class="brand-name">Lab<span>System</span></div>
    </div>

    <div class="nav-label">Menú</div>
    <a class="nav-item active" href="dashboard.html">
      <span class="nav-icon">📦</span> Productos
    </a>
    <a class="nav-item" href="#" onclick="showToast('Próximamente', 'info'); return false;">
      <span class="nav-icon">👥</span> Usuarios
    </a>
    <a class="nav-item" href="#" onclick="showToast('Próximamente', 'info'); return false;">
      <span class="nav-icon">📊</span> Reportes
    </a>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="avatarInitial">U</div>
        <div class="user-info">
          <div class="user-name" id="userDisplayName">Usuario</div>
          <div class="user-role">Laboratorio</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Cerrar sesión">⬡</button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">Productos <span>/ Inventario</span></div>
      </div>
      <button class="btn btn-ghost" onclick="loadProducts()" title="Refrescar">↻ Actualizar</button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Total productos</div>
        <div class="stat-value accent" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Precio promedio</div>
        <div class="stat-value success" id="statAvg">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Precio máximo</div>
        <div class="stat-value warning" id="statMax">—</div>
      </div>
    </div>

    <!-- Products panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📦 Listado de productos</div>
      </div>

      <!-- Add form -->
      <div class="add-form">
        <div class="form-group">
          <label for="prodName">Nombre del producto</label>
          <input id="prodName" type="text" placeholder="Ej: Reactivo A"/>
        </div>
        <div class="form-group" style="max-width:160px;">
          <label for="prodPrice">Precio (USD)</label>
          <input id="prodPrice" type="number" min="0" step="0.01" placeholder="0.00"/>
        </div>
        <button class="btn btn-primary" onclick="addProduct()">
          + Agregar
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Producto</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productTableBody">
            <!-- populated by JS -->
          </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-icon">🧪</div>
          <div class="empty-title">Sin productos</div>
          <div class="empty-sub">Agrega tu primer producto usando el formulario de arriba.</div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Editar producto</div>
    <input type="hidden" id="editId"/>
    <div class="form-group" style="margin-bottom:.9rem;">
      <label for="editName">Nombre</label>
      <input id="editName" type="text" style="width:100%;"/>
    </div>
    <div class="form-group">
      <label for="editPrice">Precio (USD)</label>
      <input id="editPrice" type="number" min="0" step="0.01" style="width:100%;"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
<script>
  // Edit modal helpers (llamados desde app.js)
  function openEditModal(id, name, price) {
    document.getElementById('editId').value    = id;
    document.getElementById('editName').value  = name;
    document.getElementById('editPrice').value = price;
    document.getElementById('editModal').classList.add('open');
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });
</script>
</body>
</html>
